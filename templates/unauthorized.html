<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>HubChecker — Access Denied</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@700&display=swap" rel="stylesheet"/>
<style>
  :root { --red: #e02020; --bg: #0a0a0a; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: #e8e8e8; font-family: 'Share Tech Mono', monospace; min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; text-align: center; }
  .code { font-family: 'Rajdhani', sans-serif; font-size: 100px; color: var(--red); font-weight: 700; line-height: 1; }
  .msg { font-size: 14px; color: #666; letter-spacing: 2px; text-transform: uppercase; }
  a { color: var(--red); text-decoration: none; font-size: 12px; letter-spacing: 2px; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="code">403</div>
  <div class="msg">Access Denied — Your Discord ID is not authorized</div>
  <a href="/logout">← Back to login</a>
</body>
</html>
