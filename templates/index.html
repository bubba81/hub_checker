<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HubChecker</title>

<!-- Discord / Open Graph embed -->
<meta property="og:type"        content="website"/>
<meta property="og:url"         content="https://hub-checker.vercel.app/"/>
<meta property="og:title"       content="HubChecker"/>
<meta property="og:description" content="Anti-cheat forensic scanner for Roblox. Download the scanner or log in to view results."/>
<meta property="og:image"       content="https://hub-checker.vercel.app/static/embed.png"/>
<meta name="theme-color"        content="#e02020"/>

<!-- Twitter card (also used by some Discord clients) -->
<meta name="twitter:card"        content="summary_large_image"/>
<meta name="twitter:title"       content="HubChecker"/>
<meta name="twitter:description" content="Anti-cheat forensic scanner for Roblox. Download the scanner or log in to view results."/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --red:              #e02020;
  --red-bright:       #ff3b30;
  --red-dim:          rgba(224,32,32,.12);
  --red-glass:        rgba(224,32,32,.08);
  --bg:               #0a0a0a;
  --glass-1:          rgba(255,255,255,.035);
  --glass-2:          rgba(255,255,255,.055);
  --glass-border:     rgba(255,255,255,.08);
  --glass-border-red: rgba(224,32,32,.25);
  --text:             #f0f0f0;
  --text-2:           rgba(240,240,240,.55);
  --text-3:           rgba(240,240,240,.28);
  --mono:             'DM Mono', monospace;
  --sans:             'DM Sans', sans-serif;
  --display:          'Syne', sans-serif;
  --blur:             blur(24px);
  --blur-sm:          blur(12px);
  --radius:           16px;
  --radius-sm:        10px;
  --radius-xs:        7px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
}

/* ── Ambient orbs ─────────────────────────────────────────────────────── */
.bg-ambient {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; overflow: hidden;
}
.bg-orb {
  position: absolute; border-radius: 50%;
  filter: blur(80px); opacity: .18;
  animation: orbFloat 14s ease-in-out infinite;
}
.bg-orb-1 {
  width: 600px; height: 600px;
  background: radial-gradient(circle, #c01010, transparent 70%);
  top: -200px; left: -140px;
}
.bg-orb-2 {
  width: 420px; height: 420px;
  background: radial-gradient(circle, #8c0000, transparent 70%);
  bottom: -100px; right: -100px;
  animation-delay: -5s;
}
.bg-orb-3 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, #e02020, transparent 70%);
  top: 50%; left: 58%;
  opacity: .06;
  animation-delay: -9s;
}
@keyframes orbFloat {
  0%,100% { transform: translate(0,0) scale(1); }
  33%     { transform: translate(22px,-28px) scale(1.04); }
  66%     { transform: translate(-14px,18px) scale(.97); }
}

/* noise grain */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 9999;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  background-size: 180px;
  pointer-events: none;
  opacity: .5;
}

/* ── Nav ──────────────────────────────────────────────────────────────── */
nav {
  position: relative; z-index: 10;
  padding: 0 36px;
  height: 62px;
  display: flex; align-items: center;
  border-bottom: 1px solid var(--glass-border);
  background: rgba(10,10,10,.5);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  flex-shrink: 0;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  text-decoration: none;
}
.brand-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, rgba(224,32,32,.25), rgba(224,32,32,.08));
  border: 1px solid var(--glass-border-red);
  display: flex; align-items: center; justify-content: center;
  color: var(--red-bright); font-size: 14px;
  box-shadow: 0 0 14px rgba(224,32,32,.1), inset 0 1px 0 rgba(255,255,255,.07);
}
.brand-name {
  font-family: var(--display);
  font-size: 16px; font-weight: 800;
  letter-spacing: -.3px; color: #fff;
}
.brand-name span { color: var(--red-bright); }

/* ── Center stage ─────────────────────────────────────────────────────── */
.stage {
  position: relative; z-index: 1;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 0 24px;
}

/* wordmark */
.hero-wordmark {
  font-family: var(--display);
  font-size: clamp(38px, 6vw, 72px);
  font-weight: 800;
  letter-spacing: -2px;
  color: #fff;
  line-height: 1;
  margin-bottom: 14px;
  animation: fadeUp .55s cubic-bezier(.22,1,.36,1) both;
}
.hero-wordmark span { color: var(--red-bright); }

/* tagline */
.hero-tag {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-3);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 52px;
  animation: fadeUp .55s .08s cubic-bezier(.22,1,.36,1) both;
}

/* button row */
.btn-row {
  display: flex;
  align-items: center;
  gap: 12px;
  animation: fadeUp .55s .16s cubic-bezier(.22,1,.36,1) both;
}

/* shared button base */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  padding: 13px 32px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  border-radius: var(--radius-sm);
  cursor: pointer;
  text-decoration: none;
  transition: all .22s cubic-bezier(.22,1,.36,1);
  white-space: nowrap;
  position: relative;
  overflow: hidden;
}
/* subtle shimmer on hover */
.btn::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,.08) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: transform .4s;
}
.btn:hover::after { transform: translateX(100%); }

/* Download — primary filled red */
.btn-download {
  background: linear-gradient(145deg, rgba(224,32,32,.85), rgba(170,8,8,.95));
  border: 1px solid rgba(224,32,32,.5);
  color: #fff;
  box-shadow: 0 0 24px rgba(224,32,32,.2), 0 4px 16px rgba(0,0,0,.4);
}
.btn-download:hover {
  background: linear-gradient(145deg, var(--red-bright), #c01010);
  box-shadow: 0 0 36px rgba(224,32,32,.35), 0 6px 24px rgba(0,0,0,.5);
  transform: translateY(-2px);
}
.btn-download:active { transform: translateY(0); }

/* Login — glass secondary */
.btn-login {
  background: var(--glass-1);
  border: 1px solid var(--glass-border);
  color: var(--text-2);
  backdrop-filter: var(--blur-sm);
  -webkit-backdrop-filter: var(--blur-sm);
  box-shadow: 0 1px 0 rgba(255,255,255,.05) inset, 0 4px 16px rgba(0,0,0,.25);
}
.btn-login:hover {
  border-color: var(--glass-border-red);
  color: #fff;
  background: var(--glass-2);
  box-shadow: 0 1px 0 rgba(255,255,255,.07) inset, 0 0 20px rgba(224,32,32,.08), 0 6px 20px rgba(0,0,0,.35);
  transform: translateY(-2px);
}
.btn-login:active { transform: translateY(0); }

/* divider dot between buttons */
.btn-divider {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: var(--text-3);
  flex-shrink: 0;
}

/* ── Animations ───────────────────────────────────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Footer ───────────────────────────────────────────────────────────── */
footer {
  position: relative; z-index: 1;
  padding: 20px 36px;
  border-top: 1px solid var(--glass-border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  animation: fadeUp .55s .28s cubic-bezier(.22,1,.36,1) both;
}
.footer-text {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: 1px;
}

/* ── Responsive ───────────────────────────────────────────────────────── */
@media (max-width: 480px) {
  nav { padding: 0 20px; }
  .btn-row { flex-direction: column; width: 100%; }
  .btn { width: 100%; justify-content: center; }
  .btn-divider { display: none; }
  .hero-wordmark { letter-spacing: -1px; }
}
</style>
</head>
<body>

<div class="bg-ambient">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>

<!-- NAV -->
<nav>
  <a href="/" class="brand">
    <div class="brand-icon">⬡</div>
    <div class="brand-name">Hub<span>Checker</span></div>
  </a>
</nav>

<!-- HERO -->
<div class="stage">
  <div class="hero-wordmark">Hub<span>Checker</span></div>
  <div class="hero-tag">Anti-cheat scan platform</div>

  <div class="btn-row">
    <a href="https://cdn.discordapp.com/attachments/1469444825429311498/1484043905623261184/embed.png?ex=69bccb17&is=69bb7997&hm=4861eb7cf2b8f1e04c7841ad6dc443905f30aaa1099eb386e7a354ca6eef8ce1&" class="btn btn-download" download>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download
    </a>

    <div class="btn-divider"></div>

    <a href="/login" class="btn btn-login">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      Login
    </a>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <span class="footer-text">HubChecker — Anti-cheat forensic scanner</span>
</footer>

</body>
</html>
